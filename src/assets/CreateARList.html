<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Create AR Follow-up List</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <style>
      :root {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        font-size: 14px;
        color: #212529;
      }

      body {
        margin: 0;
        padding: 16px;
        background-color: #f8f9fa;
        font-size: 16px;
      }

      .ar-card {
        background: #fff;
        border-radius: 8px;
        border: 1px solid #dee2e6;
        padding: 16px;
        box-shadow: 0 2px 4px rgba(15, 23, 42, 0.08);
      }

      .ar-card-header {
        margin-bottom: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }

      .ar-card-title {
        font-size: 18px;
        font-weight: 700;
        margin: 0;
        color: #09090b;
        letter-spacing: -0.01em;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        padding: 2px 10px;
        font-size: 13px;
        font-weight: 500;
        background-color: #f4f4f5;
        color: #3f3f46;
        border: 1px solid #e4e4e7;
      }

      .badge-pill-primary {
        background-color: #f4f4f5;
        color: #09090b;
        border: 1px solid #e4e4e7;
      }

      .mb-2 {
        margin-bottom: 8px;
      }
      .mb-3 {
        margin-bottom: 12px;
      }
      .mb-4 {
        margin-bottom: 16px;
      }

      .form-group {
        margin-bottom: 12px;
      }

      .form-label {
        display: block;
        margin-bottom: 4px;
        font-size: 15px;
        font-weight: 500;
      }

      .form-control {
        width: 100%;
        border-radius: 6px;
        border: 1px solid #e4e4e7;
        padding: 6px 10px;
        font-size: 14px;
        box-sizing: border-box;
        color: #09090b;
        outline: none;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
      }

      .form-control:focus {
        border-color: #09090b;
        box-shadow: 0 0 0 2px rgba(9, 9, 11, 0.08);
      }

      .form-text {
        font-size: 13px;
        color: #6c757d;
        margin-top: 2px;
      }

      .filter-box {
        border-radius: 6px;
        border: 1px solid #e2e8f0;
        background-color: #f8fafc;
        padding: 10px 12px;
        margin-bottom: 12px;
      }

      .filter-box-title {
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 6px;
        color: #71717a;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .filter-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 4px 12px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .filter-grid dt {
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #6c757d;
        margin: 0 0 2px;
      }

      .filter-grid dd {
        font-size: 14px;
        margin: 0;
        color: #212529;
        word-break: break-word;
      }

      /* INLINE ROW FOR LIST NAME + ACTION */
      .form-row-inline {
        display: flex;
        flex-wrap: nowrap;
        gap: 12px 16px;
        align-items: flex-start; /* align labels/top */
        width: 100%;
      }

      .form-row-inline .form-group {
        margin-bottom: 0;
      }

      .form-row-inline .form-group--name {
        flex: 1 1 auto;
        min-width: 320px;
      }

      .form-row-inline .form-group--action {
        flex: 0 0 260px;
        max-width: 260px;
      }

      .form-group--action .form-text {
        font-size: 12px;
        color: #71717a;
      }

      .actions-row {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 16px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        border: 1px solid transparent;
        font-size: 14px;
        font-weight: 500;
        padding: 4px 12px;
        cursor: pointer;
        background-color: transparent;
        transition: background-color 0.15s ease, border-color 0.15s ease,
          color 0.15s ease;
      }

      .btn-sm {
        padding: 3px 10px;
        font-size: 13px;
      }

      .btn-outline-secondary {
        border-color: #ced4da;
        color: #495057;
        background-color: #fff;
      }

      .btn-outline-secondary:hover {
        background-color: #f1f3f5;
      }

      .btn-primary {
        background-color: #09090b;
        border-color: #09090b;
        color: #ffffff;
      }

      .btn-primary:hover {
        background-color: #27272a;
        border-color: #27272a;
      }

      .btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div class="ar-card">
      <div class="ar-card-header">
        <h1 class="ar-card-title">Create AR Follow-up List</h1>
        <span class="badge badge-pill-primary">
          <span id="claim-count">…</span> claims
        </span>
      </div>

      <div class="filter-box">
        <div class="filter-box-title">Current filters</div>
        <div id="filter-details">
          <em>Waiting for filters from parent window…</em>
        </div>
      </div>

      <form id="ar-list-form">
        <div class="form-row-inline">
          <div class="form-group form-group--name">
            <label for="arListName" class="form-label">List name</label>
            <input
              id="arListName"
              name="arListName"
              type="text"
              class="form-control"
              placeholder="e.g., High $ AR &gt; 90 days"
            />
            <div class="form-text">
              This list will include all claims matching the filters above.
            </div>
          </div>

          <div class="form-group form-group--action">
            <label for="arListAction" class="form-label">Action</label>
            <select
              id="arListAction"
              name="arListAction"
              class="form-control">
              <!-- Options injected from JS; default = Save List -->
            </select>
            <div class="form-text">
              Default action is <b>Save List</b>. You can also assign it to a
              user.
            </div>
          </div>
        </div>

        <div class="actions-row">
          <button
            type="button"
            class="btn btn-sm btn-outline-secondary"
            id="btn-cancel"
          >
            Cancel
          </button>
          <button type="submit" class="btn btn-sm btn-primary">
            Save List
          </button>
        </div>
      </form>
    </div>

    <script>
      (function () {
        var arListActions = [
          { value: "SAVE_LIST", label: "Save List" },
          { value: "ASSIGN_TO_AR_MANAGER", label: "Assign to AR Manager" },
          { value: "ASSIGN_TO_AGENT", label: "Assign to AR Agent" }
        ];

        var selectedAction = "SAVE_LIST";
        var currentContext = null;

        function renderFilters(data) {
          var box = document.getElementById("filter-details");
          var countEl = document.getElementById("claim-count");
          if (!box) return;

          var f = data || {};
          if (typeof f.filteredCount === "number" && countEl) {
            countEl.textContent = f.filteredCount;
          }

          var arDays;
          if (f.arDaysFrom == null && f.arDaysTo == null) {
            arDays = "Any";
          } else {
            var from = f.arDaysFrom != null ? f.arDaysFrom : 0;
            var to = f.arDaysTo != null ? f.arDaysTo : "∞";
            arDays = from + " – " + to;
          }

          var amt;
          if (f.amountFrom == null && f.amountTo == null) {
            amt = "Any";
          } else {
            var fromAmt = f.amountFrom != null ? "$" + f.amountFrom : "$0";
            var toAmt = f.amountTo != null ? "$" + f.amountTo : "+∞";
            amt = fromAmt + " to " + toAmt;
          }

          var payer = f.payerTopLabel || "All payers";
          var queueLabel = f.queueLabel || "All claims";
          var search = f.searchText ? '"' + f.searchText + '"' : "None";

          box.innerHTML =
            '<dl class="filter-grid">' +
            "<div>" +
            "<dt>Queue</dt>" +
            "<dd><b>" +
            queueLabel +
            "</b></dd>" +
            "</div>" +
            "<div>" +
            "<dt>Search</dt>" +
            "<dd><b>" +
            search +
            "</b></dd>" +
            "</div>" +
            "<div>" +
            "<dt>AR Days</dt>" +
            "<dd><b>" +
            arDays +
            "</b></dd>" +
            "</div>" +
            "<div>" +
            "<dt>Insurance AR $</dt>" +
            "<dd><b>" +
            amt +
            "</b></dd>" +
            "</div>" +
            "<div>" +
            "<dt>Payers</dt>" +
            "<dd><b>" +
            payer +
            "</b></dd>" +
            "</div>" +
            "</dl>";
        }

        var actionSelect = document.getElementById("arListAction");
        if (actionSelect) {
          arListActions.forEach(function (a, idx) {
            var opt = document.createElement("option");
            opt.value = a.value;
            opt.textContent = a.label;
            if (idx === 0) opt.selected = true;
            actionSelect.appendChild(opt);
          });

          actionSelect.value = "SAVE_LIST";
          selectedAction = "SAVE_LIST";

          actionSelect.addEventListener("change", function () {
            selectedAction = actionSelect.value || "SAVE_LIST";
          });
        }

        window.addEventListener("message", function (event) {
          if (event.origin !== window.location.origin) return;
          var payload = event.data || {};
          if (payload.kind !== "AR_LIST_CONTEXT") return;

          currentContext = payload;
          renderFilters(payload.filters || {});
        });

        document
          .getElementById("btn-cancel")
          .addEventListener("click", function () {
            window.close();
          });

        document
          .getElementById("ar-list-form")
          .addEventListener("submit", function (e) {
            e.preventDefault();
            var input = document.getElementById("arListName");
            var name = ((input && input.value) || "").trim();
            if (!name) {
              alert("Please enter a name for the AR Follow-up list.");
              if (input) input.focus();
              return;
            }


            // Build message for parent (Angular)
            var message = {
              kind: "AR_LIST_SAVE",
              listName: name,
              action: selectedAction,
              filters: currentContext ? currentContext.filters : null
            };

            try {
              if (window.opener && !window.opener.closed) {
                window.opener.postMessage(message, window.location.origin);
              }
            } catch (err) {
              console.error(
                "Error posting AR_LIST_SAVE message to opener:",
                err
              );
            }

            window.close();
          });
      })();
    </script>
  </body>
</html>
