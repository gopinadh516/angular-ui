<div class="container mt-3">
  <h4>Auto Coding</h4>

  <textarea [(ngModel)]="clinicalText" class="form-control" rows="6" placeholder="Enter clinical note..."></textarea>

  <button class="btn btn-primary mt-2" (click)="predictCodes()">Code</button>

  <div *ngIf="loading" class="mt-2">Processing...</div>

  <div *ngIf="result" class="mt-3">
    <h5>Prediction Result:</h5>
    <pre>{{ result }}</pre>
  </div>

  <div *ngIf="error" class="text-danger mt-2">{{ error }}</div>

  <!-- Clinical Notes Table -->
  <div class="mt-4">
    <h5>Clinical Notes:</h5>
    <table class="table table-hover table-bordered">
      <thead>
        <tr><th>Clinical Note</th></tr>
      </thead>
      <tbody>
        <tr *ngFor="let note of clinicalNotes" (click)="clinicalText = note" style="cursor:pointer">
          <td>{{ note }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
