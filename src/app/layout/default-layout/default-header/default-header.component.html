<ng-container>
  <c-container [fluid]="true" class="border-bottom px-4 header-container-fix">
    <button
      [cSidebarToggle]="sidebarId()"
      cHeaderToggler
      class="btn"
      toggle="visible"
      style="margin-inline-start: -14px;"
      aria-label="Toggle sidebar navigation"
    >
      <svg cIcon name="cilMenu" size="lg"></svg>
    </button>

    <c-header-nav class="d-none d-md-flex">
      <c-nav-item *ngIf="showClaimsListsLink">
        <a cNavLink routerLink="/claimstatus" routerLinkActive="active">Claims Lists</a>
      </c-nav-item>

      <c-nav-item *ngIf="showDashboardLinks">
        <a cNavLink routerLink="/management-dashboard" routerLinkActive="active">  Dashboard</a>
      </c-nav-item>

      <c-nav-item *ngIf="showDashboardLinks">
        <a cNavLink routerLink="/dashboard" routerLinkActive="active">  AR Center</a>
      </c-nav-item>

      <c-nav-item *ngIf="showArListsLink">
        <a cNavLink routerLink="/ar-lists" routerLinkActive="active">  View AR Lists</a>
      </c-nav-item>
    </c-header-nav>

    <c-header-nav class="d-none d-md-flex ms-auto">
      <a cNavLink>
        <svg cIcon class="my-1" name="cilBell" size="lg"></svg>
      </a>
      <a cNavLink>
        <svg cIcon class="my-1" name="cilList" size="lg"></svg>
      </a>
      <a cNavLink>
        <svg cIcon class="my-1" name="cilEnvelopeOpen" size="lg"></svg>
      </a>
    </c-header-nav>

    <div class="d-none d-md-flex align-items-center ms-3">
      <span class="me-2 fw-semibold small">Client</span>

      <c-dropdown
        [popperOptions]="{ placement: 'bottom-start', strategy: 'fixed' }"
        variant="nav-item"
      >
        <button
          cDropdownToggle
          type="button"
          class="btn btn-sm border bg-body client-dropdown-btn"
          aria-label="Select client"
        >
          {{ selectedClientLabel }}
        </button>

        <ul
          cDropdownMenu
          class="w-auto shadow client-dropdown-menu"
        >
          <li *ngFor="let client of clientOptions">
            <button
              cDropdownItem
              type="button"
              (click)="setSelectedClient(client.code)"
              [active]="selectedClient === client.code"
            >
              {{ client.label }}
            </button>
          </li>
        </ul>
      </c-dropdown>
    </div>

    <c-header-nav class="ms-auto ms-md-0">
      <div class="nav-item py-1">
        <div class="vr h-100 mx-2 text-body text-opacity-75"></div>
      </div>
      <ng-container *ngTemplateOutlet="themeDropdown"></ng-container>
      <div class="nav-item py-1">
        <div class="vr h-100 mx-2 text-body text-opacity-75"></div>
      </div>
    </c-header-nav>

    <c-header-nav class="mx-0">
      <ng-container *ngTemplateOutlet="userDropdown"></ng-container>
    </c-header-nav>
  </c-container>
</ng-container>

<ng-template #userDropdown>
  <c-dropdown [popperOptions]="{ placement: 'bottom-start' }" variant="nav-item">
    <button [caret]="false" cDropdownToggle class="py-0 pe-0" aria-label="Open user menu">
      <c-avatar
        shape="rounded-1"
        [size]="'md'"
        [src]="userAvatarSrc"
        status="success"
        textColor="primary"
        alt="User avatar"
      />
    </button>
    <ul cDropdownMenu class="pt-0 w-auto">
      <li>
        <h6 cDropdownHeader class="bg-body-secondary text-body-secondary fw-semibold py-2 rounded-top">
          Account
        </h6>
      </li>
      <li>
        <a cDropdownItem routerLink="">
          <svg cIcon class="me-2" name="cilBell"></svg>
          Updates
          <c-badge class="ms-2 float-end" color="info">42</c-badge>
        </a>
      </li>
      <li>
        <a cDropdownItem routerLink="/apps/email/inbox">
          <svg cIcon class="me-2" name="cilEnvelopeOpen"></svg>
          Messages
          <c-badge class="ms-2 float-end" color="success">42</c-badge>
        </a>
      </li>
      <li>
        <hr cDropdownDivider />
      </li>
      <li>
        <a cDropdownItem routerLink="/login">
          <svg cIcon class="me-2" name="cilAccountLogout"></svg>
          Logout
        </a>
      </li>
    </ul>
  </c-dropdown>
</ng-template>

<ng-template #themeDropdown>
  <c-dropdown alignment="end" variant="nav-item">
    <button [caret]="false" cDropdownToggle aria-label="Open theme picker">
      <svg cIcon [name]="icons()" size="lg"></svg>
    </button>
    <div cDropdownMenu>
      @for (mode of colorModes; track mode.name) {
        <button
          (click)="colorMode.set(mode.name)"
          [active]="colorMode()===mode.name"
          cDropdownItem
          class="d-flex align-items-center"
        >
          <svg cIcon class="me-2" [name]="mode.icon" size="lg"></svg>
          {{ mode.text }}
        </button>
      }
    </div>
  </c-dropdown>
</ng-template>
